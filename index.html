<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheikh Gaming Family — Join the Squad</title>
    <meta name="description" content="Join the SHEIKH GAMING FAMILY squads today! Premium gaming community links.">
    
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: #b0b8c8;
            --text-glow: rgba(255, 255, 255, 0.25);
            
            /* Glass Card */
            --card-bg: rgba(0, 0, 0, 0.4);
            --card-blur: blur(14px);
            --card-radius: 20px;
            --card-border: 1px solid rgba(255, 255, 255, 0.1);
            --card-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 80px rgba(0, 0, 0, 0.3);
            
            /* Button Glass */
            --btn-bg: rgba(255, 255, 255, 0.06);
            --btn-bg-hover: rgba(255, 255, 255, 0.10);
            --btn-border: rgba(255, 255, 255, 0.10);
            --btn-blur: blur(10px);
            
            --hover-red: rgba(255, 50, 50, 0.55);
            --hover-red-glow: 0 6px 28px rgba(255, 50, 50, 0.2);
            
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-fast: all 0.2s ease;
            
            --card-width: min(90vw, 400px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        /* ========== FULL-PAGE BANNER BACKGROUND ========== */
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            
            /* Banner as full-page background */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.85)),
                url('banner.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #000;
        }

        /* Vignette overlay around edges */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Subtle light focus behind center card */
        body::after {
            content: "";
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(180, 40, 40, 0.08) 0%, transparent 70%);
            filter: blur(40px);
            z-index: 1;
            pointer-events: none;
        }

        /* Noise texture overlay */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: 2;
            pointer-events: none;
        }

        /* ========== GLASS CARD CONTAINER ========== */
        .glass-card {
            position: relative;
            z-index: 10;
            width: var(--card-width);
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            -webkit-backdrop-filter: var(--card-blur);
            border: var(--card-border);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            padding: 0 28px 36px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.97);
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Subtle shine on glass card top edge */
        .glass-card::before {
            content: "";
            position: absolute;
            top: 0; left: 20px; right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            border-radius: 50%;
        }

        /* ========== PROFILE IMAGE (overlapping top) ========== */
        .profile-wrapper {
            margin-top: -50px;
            margin-bottom: 18px;
            display: flex;
            justify-content: center;
        }

        .profile-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, rgba(255, 60, 60, 0.4), rgba(255, 255, 255, 0.15));
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 50, 50, 0.08);
            animation: logoFloat 3s ease-in-out infinite, logoGlow 3s ease-in-out infinite alternate;
        }

        /* Subtle floating — gentle up/down */
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Soft pulsing glow */
        @keyframes logoGlow {
            0% { box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 50, 50, 0.06); }
            100% { box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), 0 0 50px rgba(255, 50, 50, 0.15), 0 0 80px rgba(255, 50, 50, 0.06); }
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: #111;
            display: block;
        }

        /* ========== SOCIAL ICONS (centered, inside card) ========== */
        .social-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            padding: 16px 0 6px 0;
            margin-bottom: 8px;
        }

        .social-bar a {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1.35rem;
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 42px; height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .social-bar a::after {
            content: attr(data-tooltip);
            position: absolute;
            top: -36px;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ffffff;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            white-space: nowrap;
            letter-spacing: 0.5px;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-fast);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-bar a:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .social-bar a:hover {
            color: #ffffff;
            background: rgba(255, 50, 50, 0.15);
            border-color: rgba(255, 50, 50, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(255, 50, 50, 0.15);
        }

        /* ========== TITLE SECTION ========== */
        .title-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .profile-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-main);
            text-shadow: 0 0 20px var(--text-glow), 0 0 60px rgba(255, 255, 255, 0.05);
            margin-bottom: 6px;
            line-height: 1.3;
            min-height: 1.82em; /* prevent layout shift */
        }

        /* Fade-in letter animation */
        .fade-letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(8px);
            animation: letterFadeIn 0.5s ease forwards;
        }

        /* Space between words */
        .fade-space {
            display: inline-block;
            width: 0.35em;
        }

        @keyframes letterFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.8px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.06);
        }

        /* Thin separator line */
        .separator {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 60, 60, 0.4), transparent);
            margin: 0 auto 28px auto;
        }

        /* ========== LINK BUTTONS ========== */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 18px;
            border-radius: 14px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: var(--transition);
            background: var(--btn-bg);
            backdrop-filter: var(--btn-blur);
            -webkit-backdrop-filter: var(--btn-blur);
            border: 1px solid var(--btn-border);
            overflow: hidden;
        }

        /* Animated shimmer on hover */
        .link-btn::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.04), transparent);
            transition: left 0.5s ease;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            background: var(--btn-bg-hover);
            border-color: var(--hover-red);
            transform: translateY(-2px);
            box-shadow: var(--hover-red-glow);
        }

        .link-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .whatsapp-icon {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            flex-shrink: 0;
            transition: var(--transition-fast);
        }

        .link-btn:hover .whatsapp-icon {
            color: #25d366;
        }

        .kick-btn:hover {
            border-color: rgba(83, 252, 31, 0.55) !important;
            box-shadow: 0 6px 28px rgba(83, 252, 31, 0.2) !important;
        }

        .kick-btn:hover .kick-icon {
            color: #53fc1f;
        }

        .social-bar a.kick-social:hover,
        .social-bar a[aria-label="Kick"]:hover {
            color: #53fc1f !important;
            background: rgba(83, 252, 31, 0.15) !important;
            border-color: rgba(83, 252, 31, 0.3) !important;
            box-shadow: 0 4px 16px rgba(83, 252, 31, 0.2) !important;
        }

        .btn-text {
            flex: 1;
            text-align: center;
            padding-right: 28px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
        }

        /* ========== FOOTER ========== */
        .footer {
            margin-top: 28px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.4;
            letter-spacing: 0.5px;
        }

        /* ========== STAGGERED ENTRANCE ANIMATIONS ========== */
        .social-bar { animation: fadeIn 0.6s 0.2s ease both; }
        .profile-wrapper { animation: fadeIn 0.6s 0.1s ease both; }
        .title-section { animation: fadeIn 0.6s 0.3s ease both; }
        .separator { animation: fadeIn 0.6s 0.35s ease both; }
        .links-container .link-btn:nth-child(1) { animation: slideUp 0.4s 0.4s ease both; }
        .links-container .link-btn:nth-child(2) { animation: slideUp 0.4s 0.48s ease both; }
        .links-container .link-btn:nth-child(3) { animation: slideUp 0.4s 0.56s ease both; }
        .links-container .link-btn:nth-child(4) { animation: slideUp 0.4s 0.64s ease both; }
        .links-container .link-btn:nth-child(5) { animation: slideUp 0.4s 0.72s ease both; }
        .links-container .link-btn:nth-child(6) { animation: slideUp 0.4s 0.80s ease both; }
        .links-container .link-btn:nth-child(7) { animation: slideUp 0.4s 0.88s ease both; }
        .footer { animation: fadeIn 0.5s 0.9s ease both; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== RESPONSIVE ========== */
        
        /* Mobile */
        @media (max-width: 480px) {
            body {
                padding: 60px 0 40px 0;
                /* Reduce blur on mobile for performance */
                background-attachment: scroll;
            }

            .glass-card {
                width: 92vw;
                padding: 0 20px 30px 20px;
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }

            .profile-ring {
                width: 90px;
                height: 90px;
            }

            .profile-wrapper {
                margin-top: -45px;
            }

            .profile-title {
                font-size: 1.2rem;
            }

            .link-btn {
                padding: 18px 16px;
                font-size: 0.95rem;
                border-radius: 14px;
            }

            .social-bar a {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }

        /* Tablets */
        @media (min-width: 481px) and (max-width: 768px) {
            .glass-card {
                width: 85vw;
                max-width: 420px;
            }
        }

        /* Desktop */
        @media (min-width: 769px) {
            .glass-card {
                width: 400px;
            }

            .link-btn {
                padding: 17px 20px;
            }
        }

        /* Prefers reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
